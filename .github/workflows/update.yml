name: Update Sommerkino ICS

on:
  schedule:
    # täglich um 06:00 UTC (= 08:00 Sommerzeit Berlin)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py > sommerkino.ics

      - name: Show summary
        run: |
          echo "Anzahl Termine:"
          grep -c "BEGIN:VEVENT" sommerkino.ics || true

      - name: Commit and push if changed
        run: |
          git config user.name "sommerkino-bot"
          git config user.email "actions@github.com"
          git add sommerkino.ics
          git diff --staged --quiet || git commit -m "Update Sommerkino-Programm $(date -u +%Y-%m-%d)"
          git push
